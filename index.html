<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>二手车检测分析</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

.container {
  max-width: 600px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

#resultBox {
  display: none;
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: #fafafa;
}

.red {
  color: red;
}

.green {
  color: green;
}
</style>
</head>

<body>

<div class="container">

  <h2>🚗 二手车检测报告分析</h2>

  <textarea id="inputText" placeholder="粘贴检测报告内容..."></textarea>

  <input type="file" id="fileInput" />

  <button onclick="analyze()">开始分析</button>

  <div id="resultBox">

    <h3 id="level"></h3>

    <p id="conclusion"></p>

    <p>评分：<span id="score"></span></p>

    <p>建议砍价：<span id="discount"></span></p>

  </div>

</div>

<script>

async function analyze() {

  const text = document.getElementById("inputText").value;
  const file = document.getElementById("fileInput").files[0];

  const btn = document.querySelector("button");
  btn.innerText = "分析中...";
  btn.disabled = true;

  try {

    let response;

    // 📸 如果有图片
    if (file) {
      const formData = new FormData();
      formData.append("text", text);
      formData.append("file", file);

      response = await fetch("https://carai.luluzhaos.workers.dev", {
        method: "POST",
        body: formData
      });

    } else {
      // 📝 文本
      response = await fetch("https://carai.luluzhaos.workers.dev", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });
    }

    const data = await response.json();

    // 显示
    document.getElementById("resultBox").style.display = "block";

    document.getElementById("level").innerText =
      "🚗 " + data.level;

    document.getElementById("conclusion").innerText =
      data.conclusion;

    document.getElementById("score").innerText =
      data.score + " 分";

    document.getElementById("discount").innerText =
      data.discount.min + " - " + data.discount.max + " 元";

    // 颜色
    const levelEl = document.getElementById("level");
    if (data.score < 40) {
      levelEl.className = "red";
    } else {
      levelEl.className = "green";
    }

  } catch (e) {
    alert("出错：" + e.message);
  }

  btn.innerText = "开始分析";
  btn.disabled = false;
}

</script>

</body>
</html>
