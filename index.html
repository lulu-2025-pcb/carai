<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二手车检测分析</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

.container {
  max-width: 600px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 140px;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 14px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

#resultBox {
  display: none;
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: #fafafa;
}

.reason {
  margin-top: 15px;
  padding: 12px;
  background: #fff;
  border-radius: 8px;
}

.red { color: red; }
.green { color: green; }
</style>
</head>

<body>

<div class="container">

  <h2>🚗 二手车检测报告分析</h2>

  <textarea id="inputText" placeholder="粘贴检测报告内容..."></textarea>

  <input type="file" id="fileInput">

  <button onclick="analyze()">开始分析</button>

  <div id="resultBox">

    <h3 id="level"></h3>

    <p id="conclusion"></p>

    <p>评分：<span id="score"></span></p>

    <p>建议砍价：<span id="discount"></span></p>

    <div id="reasonBox" class="reason"></div>

  </div>

</div>

<script>

async function analyze() {

  const text = document.getElementById("inputText").value;
  const file = document.getElementById("fileInput").files[0];

  const btn = document.querySelector("button");
  btn.innerText = "分析中...";
  btn.disabled = true;

  try {

    let response;

    // 📸 图片
    if (file) {
      const formData = new FormData();
      formData.append("text", text);
      formData.append("file", file);

      response = await fetch("https://carai.luluzhaos.workers.dev", {
        method: "POST",
        body: formData
      });

    } else {
      // 📝 文本
      response = await fetch("https://carai.luluzhaos.workers.dev", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });
    }

    const data = await response.json();

    // ===== 显示基础结果 =====
    document.getElementById("resultBox").style.display = "block";

    document.getElementById("level").innerText =
      "🚗 " + data.level;

    document.getElementById("conclusion").innerText =
      data.conclusion;

    document.getElementById("score").innerText =
      data.score + " 分";

    document.getElementById("discount").innerText =
      data.discount.min + " - " + data.discount.max + " 元";

    // ===== 颜色 =====
    const levelEl = document.getElementById("level");
    levelEl.className = data.score < 40 ? "red" : "green";

    // ===== 核心：判断依据 =====
    let reasons = [];

    if (data.detail && data.detail.UNKNOWN_RISK) {
      reasons.push("关键部位未检测（底盘 / 纵梁等）");
    }

    if (data.detail && data.detail.STRUCT_RISK) {
      reasons.push("存在结构件 / 内骨相关维修");
    }

    if (data.detail && data.detail.ACCIDENT_COUNT > 5) {
      reasons.push("维修记录较多，不像单次事故");
    } else if (data.detail && data.detail.ACCIDENT_COUNT > 0) {
      reasons.push("存在维修或更换记录");
    }

    if (data.detail && data.detail.TOTAL_COST > 50000) {
      reasons.push("历史维修金额较高");
    } else if (data.detail && data.detail.TOTAL_COST > 20000) {
      reasons.push("历史维修金额偏高");
    }

    if (reasons.length === 0) {
      reasons.push("未发现明显结构或事故风险");
    }

    document.getElementById("reasonBox").innerHTML =
      "<b>🔍 判断依据</b><br>" +
      reasons.map(x => "• " + x).join("<br>");

  } catch (e) {
    alert("出错：" + e.message);
  }

  btn.innerText = "开始分析";
  btn.disabled = false;
}

</script>

</body>
</html>
