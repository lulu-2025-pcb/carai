<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>验车AI</title>
</head>
<body style="font-family:sans-serif;padding:20px;">

<h2>🚗 验车AI（最终版）</h2>

<input type="file" id="file"><br><br>

<textarea id="text" placeholder="或粘贴检测报告" style="width:100%;height:100px;"></textarea><br><br>

<button onclick="run()">开始分析</button>

<pre id="out" style="margin-top:20px;background:#f5f5f5;padding:10px;"></pre>

<script>

async function run(){

  const API = "https://carai.luluzhaos.workers.dev";

  const text = document.getElementById("text").value;
  const file = document.getElementById("file").files[0];

  const fd = new FormData();

  if(text){
    fd.append("text", text);
  }

  if(file){
    fd.append("file", file);
  }

  // ⭐关键：强制POST
  const res = await fetch(API,{
    method:"POST",
    body:fd
  });

  const data = await res.json();

  document.getElementById("out").innerText =
    JSON.stringify(data, null, 2);
}

</script>

</body>
</html>
