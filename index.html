<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>验车AI</title>
<style>
body{font-family:-apple-system,"PingFang SC";background:#f5f5f5;margin:0;padding:20px;}
.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:12px;}
.btn{background:#111;color:#fff;padding:14px;border:none;border-radius:10px;width:100%;font-size:16px;}
h2{margin:10px 0;}
</style>
</head>
<body>

<h2>🚗 验车AI决策</h2>

<textarea id="input" placeholder="粘贴检测报告" style="width:100%;height:100px;"></textarea>
<br><br>
<button class="btn" onclick="run()">开始分析</button>

<div id="result" style="display:none;margin-top:20px;">

  <div class="card">
    <h2 id="decision"></h2>
  </div>

  <div class="card">
    <b>发生过什么事故</b>
    <p id="accident"></p>
  </div>

  <div class="card">
    <b>事故等级</b>
    <p id="level"></p>
  </div>

  <div class="card">
    <b>后面可能问题</b>
    <p id="risk"></p>
  </div>

  <div class="card">
    <b>应该少多少钱</b>
    <p id="money"></p>
  </div>

  <div class="card">
    <b>现在价格判断</b>
    <p id="price"></p>
  </div>

</div>

<script>

const API = "https://carai.luluzhaos.workers.dev";

async function run() {

  const text = document.getElementById("input").value;

  if (!text) {
    alert("请输入报告");
    return;
  }

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  console.log("AI原始：", data.raw);
  console.log("结构化：", data.data);

  const R = data.data || {};

  // ===== 决策 =====
  let decision = "⚠️ 建议谨慎";

  if (R.STRUCT_RISK === "STRUCT") {
    decision = "❌ 不建议购买（结构受损）";
  } else if ((R.PRICE_COVERED || "").includes("未覆盖")) {
    decision = "⚠️ 可以买，但必须压价";
  } else if ((R.PRICE_COVERED || "").includes("有捡漏")) {
    decision = "✅ 可以入手";
  }

  document.getElementById("decision").innerText = decision;

  // ===== 事故还原 =====
  document.getElementById("accident").innerText =
    "→ " + (R.ACCIDENT_TYPE || "") + "（" + (R.ACCIDENT_CHAIN || "") + "）";

  // ===== 事故等级 =====
  let level = "轻微";

  if (R.STRUCT_RISK === "STRUCT") level = "严重事故";
  else if (R.IMPACT_LEVEL === "HIGH") level = "较大事故";
  else if (R.IMPACT_LEVEL === "MEDIUM") level = "中等事故";

  document.getElementById("level").innerText = level;

  // ===== 后遗症 =====
  document.getElementById("risk").innerText =
    "→ " + (R.FUTURE_RISK || "暂无");

  // ===== 金额 =====
  document.getElementById("money").innerText =
    "→ " + (R.TOTAL_LOSS || "0");

  // ===== 价格 =====
  document.getElementById("price").innerText =
    "→ " + (R.PRICE_COVERED || "未知");

  document.getElementById("result").style.display = "block";
}

</script>

</body>
</html>
