<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>验车AI</title>

<style>
body{font-family:-apple-system;background:#f1f1f1;margin:0;}
.upbox{background:#fff;margin:20px;border-radius:14px;padding:30px;text-align:center;border:2px dashed #ccc;}
.ut{font-size:18px;font-weight:700;}
.us{font-size:13px;color:#999;margin-top:6px;}
button{padding:14px;width:90%;margin:20px;border:none;background:#111;color:#fff;border-radius:10px;}
</style>
</head>

<body>

<div class="upbox" id="upbox">
  <div class="ut">上传验车报告</div>
  <div class="us">图片 · 截图 · 拍照均可</div>
</div>

<input type="file" id="fileInput" accept="image/*" multiple style="display:none">

<div style="padding:20px;">
  <textarea id="pasteText" placeholder="也可以粘贴文字" style="width:100%;height:80px;"></textarea>
</div>

<button id="analyzeBtn">免费看结果</button>

<script>
var uploadedFiles = [];
var API = "https://carai.luluzhaos.workers.dev";

// 🔥 初始化
window.onload = function () {

  var input = document.getElementById("fileInput");
  var box = document.getElementById("upbox");

  // 点击触发上传
  box.onclick = function () {
    input.click();
  };

  // 选文件
  input.addEventListener("change", function () {

    uploadedFiles = Array.from(this.files);

    console.log("选中了:", uploadedFiles);

    // 显示反馈
    if (uploadedFiles.length > 0) {
      document.querySelector(".ut").textContent =
        "已选 " + uploadedFiles.length + " 张图片";
    }

  });

};

// 🔥 点击分析
document.getElementById("analyzeBtn").onclick = async function () {

  var text = document.getElementById("pasteText").value.trim();

  if (uploadedFiles.length === 0 && text.length < 3) {
    alert("请上传或粘贴内容");
    return;
  }

  try {
    var fd = new FormData();

    uploadedFiles.forEach(function(f, i){
      fd.append("file_"+i, f);
    });

    if (text) fd.append("text", text);

    console.log("开始请求");

    var res = await fetch(API, {
      method: "POST",
      body: fd
    });

    var data = await res.json();

    console.log("返回:", data);

    alert("成功返回，查看console");

  } catch(e){
    console.error(e);
    alert("失败：" + e.message);
  }

};
</script>

</body>
</html>
